name: Compilar Sandbox 3D
on: [push] # Se compila cada vez que subís código

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar Ursina y PyInstaller
        run: |
          pip install ursina pyinstaller
          
      - name: Crear el EXE
        run: |
          pyinstaller --onefile --windowed sandbox3d.py
          
      - name: Subir el resultado
        uses: actions/upload-artifact@v4
        with:
          name: Sandbox3D-Ejecutable
          path: dist/sandbox3d.exe
